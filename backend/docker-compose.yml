version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: watir_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    container_name: watir_api
    restart: always
    ports:
      - "3000:3000"
    # Pobiera wszystkie zmienne (w tym hasło i usera) prosto z pliku .env
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres

volumes:
  pgdata: